{% extends "base/layout.html" %}

{% block title %}强制修改密码 - 游戏社区{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-warning">
            <div class="card-header bg-warning text-dark fw-bold">
                ⚠️ 安全提示：请修改您的密码
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">管理员已重置您的密码。为了您的账号安全，请在继续使用前设置一个新密码。</p>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">新密码</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">确认修改</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
