{% extends "base/layout.html" %}

{% block title %}站内消息群发 - 游戏社区{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-4">✉️ 管理员站内消息</h4>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">发送对象</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="target" id="targetUser" value="user" checked>
                                <label class="form-check-label" for="targetUser">指定用户</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="target" id="targetAll" value="all">
                                <label class="form-check-label" for="targetAll">所有用户</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3" id="userSelectWrap">
                        <label for="user_ids" class="form-label fw-bold">选择用户（可多选）</label>
                        <select class="form-select" id="user_ids" name="user_ids" multiple size="10">
                            {% for u in users %}
                                <option value="{{ u.id }}" {% if preset_user_id and u.id == preset_user_id %}selected{% endif %}>{{ u.username }}{% if u.is_admin %}（管理员）{% endif %}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text text-muted">按住 Ctrl（Windows）或 Command（Mac）可多选</div>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label fw-bold">消息内容</label>
                        <textarea class="form-control" id="content" name="content" rows="5" placeholder="请输入站内消息内容..." required></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a class="btn btn-outline-secondary" href="{{ url_for('admin.manage_users') }}">返回</a>
                        <button type="submit" class="btn btn-primary">发送</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const targetUser = document.getElementById('targetUser');
    const targetAll = document.getElementById('targetAll');
    const wrap = document.getElementById('userSelectWrap');
    const userSelect = document.getElementById('user_ids');

    const sync = () => {
        if (targetAll.checked) {
            wrap.style.display = 'none';
            Array.from(userSelect.options).forEach(o => o.selected = false);
        } else {
            wrap.style.display = '';
        }
    };

    targetUser.addEventListener('change', sync);
    targetAll.addEventListener('change', sync);
    sync();
});
</script>
{% endblock %}
