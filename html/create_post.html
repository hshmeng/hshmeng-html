{% extends "layout.html" %}

{% block title %}发布动态 - 游戏社区{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4 fw-bold text-primary">📝 发布新动态</h3>
                <form method="POST">
                    <div class="mb-4">
                        <label for="title" class="form-label fw-bold">标题</label>
                        <input type="text" name="title" class="form-control form-control-lg" id="title" placeholder="请输入标题" required>
                    </div>
                    <div class="mb-4">
                        <label for="content" class="form-label fw-bold">内容</label>
                        <textarea name="content" class="form-control" id="content" rows="10" placeholder="分享你的游戏动态或想法..." required></textarea>
                    </div>
                    
                    {% if current_user.is_admin %}
                        <div class="mb-4 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="is_news" name="is_news">
                            <label class="form-check-label fw-bold" for="is_news">📢 发布为官方新闻 (显示在首页)</label>
                        </div>
                    {% endif %}

                    <div class="d-grid gap-3 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary px-4">取消</a>
                        <button type="submit" class="btn btn-primary px-5">发布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
